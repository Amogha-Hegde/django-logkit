[django-logkit]
log_level = INFO
base_dir = .
enable_file_logging = true
log_file_name = application.log
console_style = color
file_style = plain
include_request_id = true
app_loggers = payments, notifications
log_backup = 7
log_when = D
log_timezone = UTC
log_format = [%(asctime)s] [%(process)s:%(thread)s] [%(levelname)s] [%(name)s:%(lineno)d %(funcName)s()] %(message)s

[logger_levels]
payments = DEBUG
django.db.backends = WARNING

[log_colors]
debug = blue
info = bold_white
warning = yellow
error = red
critical = bold_red

[django-logkit]
log_level = INFO
base_dir = .
enable_file_logging = true
log_file_name = application.log
console_style = json
file_style = plain
include_request_id = true
app_loggers = payments, notifications
log_backup = 7
log_when = D
log_timezone = UTC

[logger_levels]
payments = DEBUG
django.db.backends = WARNING

[log_colors]
info = green
error = red
critical = bold_red

[json_fields]
timestamp = timestamp
level = levelname
logger = name
event = event
message = message
request_id = request_id
trace_id = trace_id
span_id = span_id
project_id = project_id
org_id = org_id
tenant = tenant
duration_ms = duration_ms

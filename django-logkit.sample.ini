[django-logkit]
log_level = INFO
base_dir = .
enable_file_logging = true
log_file_name = application.log
console_style = json
file_style = plain
include_request_id = true
include_django_server_logs = true
app_loggers = api, main
log_backup = 7
log_when = D
log_timezone = UTC
django_server_message_mode = request_line

[logger_levels]
payments = DEBUG
django.db.backends = WARNING

[log_colors]
info = green
error = red
critical = bold_red

[json_fields]
timestamp = timestamp
level = levelname
logger = name
event = event
message = message
method = method
path = path
status_code = status_code
request_line = request_line
filename = filename
pathname = pathname
lineno = lineno
funcName = funcName
module = module
response_size = response_size
request_id = request_id
trace_id = trace_id
span_id = span_id
project_id = project_id
org_id = org_id
user_id = user_id
tenant = tenant
duration_ms = duration_ms
drf_view = drf_view
drf_action = drf_action
drf_serializer = drf_serializer

[json_field_defaults]
project_id = -
org_id = -
user_id = -
tenant = -
duration_ms = -
